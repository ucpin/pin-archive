<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>archive</title>

  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">

  <style>
    /* ---- VARIABLES ---- */
    :root {
      --bg: #FFFFFF;
      --text: #063659;
      --border: #063659;
      --fs: 12px; /* 🔑 single source of truth */
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Courier Prime", monospace;
      font-size: var(--fs); /* 🔑 everything inherits from this */
      background: var(--bg);
      color: var(--text);
      cursor: url("images/cursor.png") 8 8, auto;
      font-weight: 400;
      letter-spacing: 0.01em;
      line-height: 1.45;
    }

    /* ---- TYPE ---- */
    h1 {
      font-size: 40px;
      font-weight: 400;
      text-transform: lowercase;
      margin: 0 0 8px 0;
    }

    p,
    footer,
    .gate-label,
    #error,
    input,
    button {
      font-size: inherit; /* 🔑 force consistency */
    }

    header {
      margin-bottom: 32px;
    }

    p {
      margin: 0;
      max-width: 420px;
    }

    footer {
      margin-top: 48px;
    }

    /* ---- GRID ---- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); /* 🔧 fixed missing px */
      gap: 24px;
    }

    .item img {
      filter: contrast(1);
    }
    
    .item img:hover {
      filter: contrast(1.25);
    }

    /* ---- IMAGE HOVER ---- */
    @keyframes hoverFloat {
      0%   { transform: translateY(0); }
      50%  { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }

    .item img {
      width: 100%;
      display: block;
      margin-bottom: 8px;
    }

    .item img:hover {
      animation: hoverFloat 1.2s ease-in-out infinite;
    }

    /* ---- LIGHTBOX ---- */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 998;
      cursor: zoom-out;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
    }

    /* ---- PASSWORD GATE ---- */
    #gate {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .gate-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 240px;
    }

    .gate-label {
      letter-spacing: 0.05em;
    }

    input,
    button {
      font-family: inherit;
      padding: 8px;
      border: 1px solid var(--text);
      background: transparent;
      color: var(--text);
    }

    input::placeholder {
      color: var(--text);
      opacity: 0.5;
    }

    button {
      cursor: crosshair;
    }

    #error {
      display: none;
    }
  </style>
</head>

<body>

  <!-- PASSWORD GATE -->
  <div id="gate">
    <div class="gate-box">
      <span class="gate-label">access</span>
      <input type="password" id="password" placeholder="password" />
      <button onclick="checkPassword()">enter</button>
      <span id="error">denied</span>
    </div>
  </div>

  <header>
    <h1>uc pins</h1>
    <p>curated archive</p>
  </header>

  <main class="grid" id="grid"></main>

  <footer>
    <span>collection housed and maintained within uc daap</span>
  </footer>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script>
    const images = [
      "pin1.png","pin2.png","pin3.png","pin4.png","pin5.png","pin6.png",
      "pin7.png","pin8.png","pin9.png","pin10.png","pin11.png","pin12.png",
      "pin13.png","pin14.png","pin15.png","pin16.png","pin17.png","pin18.png",
      "pin19.png","pin20.png","pin21.png","pin22.png","pin23.png","pin24.png",
      "pin25.png","pin26.png","pin27.png","pin28.png","pin29.png","pin30.png",
      "pin31.png","pin32.png","pin33.png","pin34.png","pin35.png","pin36.png","pin37.png","pin38.png","pin39.png","pin40.png","pin41.png","pin42.png","pin43.png","pin44.png","pin45.png","pin46.png","pin47.png","pin48.png","pin49.png","pin50.png","pin51.png","pin52.png","pin53.png","pin54.png","pin55.png","pin56.png","pin57.png","pin58.png","pin59.png","pin60.png","pin61.png","pin62.png","pin63.png","pin64.png","pin65.png","pin66.png","pin67.png","pin68.png","pin69.png","pin70.png","pin71.png","pin72.png", "pin73.png","pin74.png","pin75.png","pin76.png","pin77.png","pin78.png","pin79.png","pin80.png","pin81.png","pin82.png","pin83.png","pin84.png","pin85.png","pin86.png","pin87.png","pin88.png","pin89.png","pin90.png","pin91.png","pin92.png","pin93.png","pin94.png","pin95.png","pin96.png","pin97.png","pin98.png","pin99.png","pin100.png"
    ];

    // shuffle
    for (let i = images.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [images[i], images[j]] = [images[j], images[i]];
    }

    const grid = document.getElementById("grid");

    images.forEach(name => {
      const item = document.createElement("div");
      item.className = "item";

      const img = document.createElement("img");
      img.src = "images/" + name;
      img.onclick = () => openLightbox(img.src);

      item.appendChild(img);
      grid.appendChild(item);
    });

    const correctPassword = "bbbp";

    function checkPassword() {
      const input = document.getElementById("password").value;
      document.getElementById("error").style.display =
        input === correctPassword ? "none" : "block";

      if (input === correctPassword) {
        document.getElementById("gate").style.display = "none";
      }
    }

    function openLightbox(src) {
      document.getElementById("lightbox-img").src = src;
      document.getElementById("lightbox").style.display = "flex";
    }

    function closeLightbox() {
      document.getElementById("lightbox").style.display = "none";
    }
  </script>

</body>
</html>
